name: Publish FlexiTabs

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Validate release tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [ "$VERSION" != "1.0.0" ]; then
            echo "Expected v1.0.0 for the initial release, got ${GITHUB_REF_NAME}"
            exit 1
          fi

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Run verification
        run: ./gradlew :flexitabs:testDebugUnitTest :sample:compileDebugKotlin

      - name: Publish release artifact to GitHub Packages
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew :flexitabs:publishReleasePublicationToGitHubPackagesRepository
